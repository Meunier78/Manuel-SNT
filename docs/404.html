<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirection…</title>
  <script>
    (function () {
      var p = window.location.pathname;
      if (/\.md$/i.test(p)) {
        var target = p.replace(/\.md$/i, "/") + window.location.search + window.location.hash;
        window.location.replace(target);
      }
    })();
  </script>
</head>
<body>
  <p>Page introuvable.</p>
</body>
</html>
