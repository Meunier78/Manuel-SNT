site_name: Manuel SNT 2de
site_url: https://meunier78.github.io/Manuel-SNT/
repo_url: https://github.com/Meunier78/Manuel-SNT
theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle: {icon: material/weather-night, name: Mode sombre}
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle: {icon: material/weather-sunny, name: Mode clair}
  features: [navigation.instant,navigation.instant.progress,navigation.tracking,navigation.path,navigation.sections,navigation.indexes,navigation.top,toc.follow,search.suggest,search.highlight]
plugins:
  - search:
      lang: fr
markdown_extensions: [admonition,attr_list,md_in_html,pymdownx.details,pymdownx.superfences]
extra_css: [stylesheets/extra.css]
copyright: Adaptation du manuel SNT Seconde — licence CC BY-NC-SA 4.0, sous réserve des droits de tiers.
nav:
  - Accueil: index.md
  - "1. Internet":
      - "Vue d’ensemble": internet/index.md
      - "Ouverture du chapitre":
