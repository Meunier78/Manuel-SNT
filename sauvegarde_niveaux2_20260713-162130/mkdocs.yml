site_name: Manuel SNT 2de
site_description: Manuel interactif de Sciences numériques et technologie — Seconde
site_url: https://meunier78.github.io/Manuel-SNT/
theme:
  name: material
  language: fr
  palette:
  - scheme: default
    primary: indigo
    accent: deep orange
    toggle:
      icon: material/weather-night
      name: Mode sombre
  - scheme: slate
    primary: indigo
    accent: deep orange
    toggle:
      icon: material/weather-sunny
      name: Mode clair
  features:
  - navigation.instant
  - navigation.instant.progress
  - navigation.tracking
  - navigation.path
  - navigation.sections
  - navigation.indexes
  - navigation.top
  - toc.follow
  - search.suggest
  - search.highlight
plugins:
- search:
    lang: fr
markdown_extensions:
- admonition
- attr_list
- md_in_html
- pymdownx.details
- pymdownx.superfences
- toc:
    permalink: true
extra_css:
- stylesheets/extra.css
- stylesheets/header-lpv.css
- stylesheets/homepage-roadmap.css
- stylesheets/chapter-landing.css
extra_javascript:
- javascripts/fix-links.js
- javascripts/sidebar-active-path.js
copyright: 'Adaptation du manuel SNT Seconde — Les Manuels Libres. Licence CC BY-NC-SA 4.0, sous réserve des droits de tiers.

  '
