name: Publier le manuel SNT

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer les fichiers
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer MkDocs
        run: pip install -r requirements.txt

      - name: Construire le site
        run: mkdocs build --strict

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer les fichiers du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Publier le site
        id: deployment
        uses: actions/deploy-pages@v4
